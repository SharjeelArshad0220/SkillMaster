<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Set Up Your Learning Profile</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-tertiary-container": "#8d0012",
              "surface-container-lowest": "#050f19",
              "secondary": "#b6c8e0",
              "tertiary": "#ffbcb7",
              "secondary-fixed-dim": "#b6c8e0",
              "on-primary-fixed-variant": "#004c69",
              "error": "#ffb4ab",
              "tertiary-fixed-dim": "#ffb3ad",
              "on-tertiary": "#68000a",
              "inverse-surface": "#d9e3f2",
              "error-container": "#93000a",
              "surface-bright": "#303a45",
              "inverse-on-surface": "#27313c",
              "on-error": "#690005",
              "outline-variant": "#3e484f",
              "on-primary": "#00354a",
              "surface-variant": "#2c3641",
              "surface-container-low": "#121c27",
              "on-primary-fixed": "#001e2c",
              "on-secondary": "#213245",
              "secondary-fixed": "#d2e4fd",
              "surface-tint": "#7bd0ff",
              "on-secondary-container": "#a5b7ce",
              "surface-dim": "#0a141e",
              "primary-fixed": "#c4e7ff",
              "surface-container": "#17202b",
              "surface": "#0a141e",
              "on-surface-variant": "#bdc8d1",
              "tertiary-fixed": "#ffdad7",
              "outline": "#87929a",
              "on-tertiary-fixed": "#410004",
              "on-surface": "#d9e3f2",
              "on-secondary-fixed": "#0a1d2f",
              "on-background": "#d9e3f2",
              "primary-container": "#38bdf8",
              "surface-container-high": "#212b35",
              "secondary-container": "#37485c",
              "inverse-primary": "#00668a",
              "primary-fixed-dim": "#7bd0ff",
              "on-primary-container": "#004965",
              "background": "#0a141e",
              "on-tertiary-fixed-variant": "#930013",
              "on-error-container": "#ffdad6",
              "surface-container-highest": "#2c3641",
              "tertiary-container": "#ff938c",
              "primary": "#8ed5ff",
              "on-secondary-fixed-variant": "#37485c"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans", "sans-serif"],
              "body": ["Plus Jakarta Sans", "sans-serif"],
              "label": ["Plus Jakarta Sans", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
      body {
        background-color: #0F1923;
        font-family: 'Plus Jakarta Sans', sans-serif;
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      /* Custom focus states following design system */
      .focus-ring:focus {
        outline: none;
        border-color: #8ed5ff !important;
      }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-16 px-4">
<!-- Page Title Block -->
<header class="w-full max-w-[720px] mb-8">
<h1 class="text-[28px] font-bold text-white tracking-tight">Set Up Your Learning Profile</h1>
<p class="text-[14px] text-[#64748B] mt-1">Tailor your educational journey by providing your preferences and goals.</p>
</header>
<!-- Form Card -->
<main class="w-full max-w-[720px] bg-[#162032] border border-[#1E2F42] shadow-[0_1px_4px_rgba(0,0,0,0.10)] rounded-lg overflow-hidden">
<form class="flex flex-col">
<!-- Section A: LEARNER INFORMATION -->
<section class="p-10 space-y-6">
<header class="flex items-center gap-2">
<span class="text-[12px] font-extrabold uppercase tracking-widest text-[#38BDF8]">Section A: LEARNER INFORMATION</span>
</header>
<div class="space-y-4">
<div>
<label class="block text-[12px] font-medium text-on-surface-variant mb-2">Full Name</label>
<input class="w-full bg-[#0F1923] border border-outline-variant rounded-md px-4 py-3 text-on-surface placeholder-[#64748B] text-[14px] focus-ring transition-all" placeholder="Enter your full name" type="text"/>
</div>
<div>
<label class="block text-[12px] font-medium text-on-surface-variant mb-2">Your Role</label>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-2 rounded-md bg-[#38BDF8] text-[#001E2C] text-[13px] font-semibold" type="button">Student</button>
<button class="px-4 py-2 rounded-md bg-surface-container-highest border border-outline-variant text-on-surface-variant text-[13px] font-medium hover:bg-surface-bright transition-colors" type="button">Job Seeker</button>
<button class="px-4 py-2 rounded-md bg-surface-container-highest border border-outline-variant text-on-surface-variant text-[13px] font-medium hover:bg-surface-bright transition-colors" type="button">Other</button>
</div>
</div>
<div>
<label class="block text-[12px] font-medium text-on-surface-variant mb-2">Current Level</label>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-2 rounded-md bg-[#38BDF8] text-[#001E2C] text-[13px] font-semibold" type="button">Beginner</button>
<button class="px-4 py-2 rounded-md bg-surface-container-highest border border-outline-variant text-on-surface-variant text-[13px] font-medium hover:bg-surface-bright transition-colors" type="button">Intermediate</button>
<button class="px-4 py-2 rounded-md bg-surface-container-highest border border-outline-variant text-on-surface-variant text-[13px] font-medium hover:bg-surface-bright transition-colors" type="button">Advanced</button>
</div>
</div>
</div>
</section>
<!-- Section B: LEARNING GOAL -->
<section class="p-10 bg-surface-container-low/30 space-y-6">
<header>
<span class="text-[12px] font-extrabold uppercase tracking-widest text-[#38BDF8]">Section B: LEARNING GOAL</span>
</header>
<div class="space-y-4">
<div>
<label class="block text-[12px] font-medium text-on-surface-variant mb-2">What do you want to learn?</label>
<input class="w-full bg-[#0F1923] border border-outline-variant rounded-md px-4 py-3 text-on-surface placeholder-[#64748B] text-[14px] focus-ring transition-all" placeholder="e.g. Modern Web Development with React" type="text"/>
</div>
<div>
<label class="block text-[12px] font-medium text-on-surface-variant mb-2">Why do you want to learn this?</label>
<textarea class="w-full bg-[#0F1923] border border-outline-variant rounded-md px-4 py-3 text-on-surface placeholder-[#64748B] text-[14px] focus-ring transition-all resize-none" placeholder="Describe your motivation and end goal..." rows="3"></textarea>
</div>
</div>
</section>
<!-- Section C: LEARNING PREFERENCES -->
<section class="p-10 space-y-6 border-b border-[#2E3D52]">
<header>
<span class="text-[12px] font-extrabold uppercase tracking-widest text-[#38BDF8]">Section C: LEARNING PREFERENCES</span>
</header>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div>
<label class="block text-[12px] font-medium text-on-surface-variant mb-2">Daily Available Time</label>
<div class="relative">
<select class="w-full bg-[#0F1923] border border-outline-variant rounded-md px-4 py-3 text-on-surface text-[14px] focus-ring appearance-none cursor-pointer">
<option>Less than 30 minutes</option>
<option selected="">30 – 60 minutes</option>
<option>1 – 2 hours</option>
<option>3+ hours</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-outline">expand_more</span>
</div>
</div>
<div>
<label class="block text-[12px] font-medium text-on-surface-variant mb-2">Preferred Pace</label>
<div class="relative">
<select class="w-full bg-[#0F1923] border border-outline-variant rounded-md px-4 py-3 text-on-surface text-[14px] focus-ring appearance-none cursor-pointer">
<option>Intense</option>
<option selected="">Steady</option>
<option>Relaxed</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-outline">expand_more</span>
</div>
</div>
</div>
<div>
<label class="block text-[12px] font-medium text-on-surface-variant mb-2">Preferred Learning Style</label>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-2 rounded-md bg-surface-container-highest border border-outline-variant text-on-surface-variant text-[13px] font-medium hover:bg-surface-bright transition-colors" type="button">Reading</button>
<button class="px-4 py-2 rounded-md bg-[#38BDF8] text-[#001E2C] text-[13px] font-semibold" type="button">Examples</button>
<button class="px-4 py-2 rounded-md bg-surface-container-highest border border-outline-variant text-on-surface-variant text-[13px] font-medium hover:bg-surface-bright transition-colors" type="button">Practice</button>
</div>
</div>
</section>
<!-- Action Area -->
<footer class="p-6 bg-[#162032] flex flex-col md:flex-row items-center justify-between gap-4">
<p class="text-[13px] text-[#64748B]">You can update these preferences at any time in settings.</p>
<div class="flex items-center gap-3">
<button class="px-6 py-2.5 rounded-md border border-[#2E3D52] text-[#64748B] text-[14px] font-semibold hover:bg-surface-container-highest hover:text-on-surface transition-all" type="button">Back</button>
<button class="px-6 py-2.5 rounded-md bg-[#38BDF8] text-[#0F1923] text-[14px] font-bold hover:bg-[#8ED5FF] transition-all flex items-center gap-2" type="submit">
<span class="material-symbols-outlined text-[18px]">auto_awesome</span>
                        Generate Roadmap
                    </button>
</div>
</footer>
</form>
</main>
<!-- Bottom Spacing -->
<div class="h-16"></div>
</body></html>
