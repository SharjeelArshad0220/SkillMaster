<meta charset="utf-8"/>

<title>Skill Master - Sign Up</title>

              "on-primary": "#00354a",
              "primary-fixed-dim": "#7bd0ff",
              "on-secondary-fixed": "#0a1d2f",
              "surface-bright": "#303a45",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface font-body text-on-surface selection:bg-primary-container selection:text-on-primary-container min-h-screen flex flex-col overflow-x-hidden">
<!-- Top Zone (35% Height) -->
<header class="h-[309px] w-full bg-[#162032] flex flex-col items-center justify-center space-y-4">
<div class="w-9 h-9 bg-primary-container flex items-center justify-center rounded-lg">
<span class="material-symbols-outlined text-[#0f1923]" style="font-variation-settings: 'FILL' 1;">architecture</span>
</div>
<div class="text-center">
<h1 class="text-white text-[22px] font-semibold tracking-tight">Skill Master</h1>
<p class="text-[#64748b] text-[12px] mt-1">AI-powered personalized learning</p>
</div>
</header>
<!-- Bottom Zone (65% Height) -->
<main class="flex-grow bg-[#0f1923] px-6 py-7">
<!-- Auth Tabs -->
<nav class="flex w-full mb-8 border-b border-outline-variant/20">
<button class="flex-1 pb-4 text-[14px] font-medium text-[#64748b] text-center">
                Login
            </button>
<button class="flex-1 pb-4 text-[14px] font-semibold text-primary-container border-b-2 border-primary-container text-center">
                Join
            </button>
</nav>
<!-- Form Section -->
<form class="flex flex-col space-y-4">
<!-- Full Name -->
<div class="flex flex-col space-y-2">
<label class="text-white text-[12px] font-medium tracking-wide">Full Name</label>
<input class="w-full bg-[#0f1923] border border-[#2e3d52] rounded-none py-3 px-4 text-[14px] text-on-surface placeholder:text-outline focus:border-primary-container focus:ring-0 transition-colors" placeholder="Enter your full name" type="text"/>
</div>
<!-- Email -->
<div class="flex flex-col space-y-2">
<label class="text-white text-[12px] font-medium tracking-wide">Email</label>
<input class="w-full bg-[#0f1923] border border-[#2e3d52] rounded-none py-3 px-4 text-[14px] text-on-surface placeholder:text-outline focus:border-primary-container focus:ring-0 transition-colors" placeholder="your@email.com" type="email"/>
</div>
<!-- Password -->
<div class="flex flex-col space-y-2">
<label class="text-white text-[12px] font-medium tracking-wide">Password</label>
<div class="relative">
<input class="w-full bg-[#0f1923] border border-[#2e3d52] rounded-none py-3 pl-4 pr-10 text-[14px] text-on-surface placeholder:text-outline focus:border-primary-container focus:ring-0 transition-colors" placeholder="Create a password" type="password"/>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline text-[20px] cursor-pointer">visibility</span>
</div>
</div>
<!-- Confirm Password -->
<div class="flex flex-col space-y-2">
<label class="text-white text-[12px] font-medium tracking-wide">Confirm Password</label>
<div class="relative">
<input class="w-full bg-[#0f1923] border border-[#2e3d52] rounded-none py-3 pl-4 pr-10 text-[14px] text-on-surface placeholder:text-outline focus:border-primary-container focus:ring-0 transition-colors" placeholder="Repeat your password" type="password"/>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline text-[20px] cursor-pointer">visibility</span>
</div>
</div>
<!-- Action Button -->
<button class="w-full h-10 bg-primary-container text-[#0f1923] text-[14px] font-bold uppercase tracking-wider rounded-none hover:bg-primary transition-colors flex items-center justify-center mt-4" type="submit">
                Create Account
            </button>
</form>
<!-- Footer Helper -->
<div class="mt-8 text-center">
<p class="text-[#64748b] text-[13px]">
                Already have an account? <a class="text-primary-container font-medium" href="#">Log In</a>
</p>
</div>
</main>
<!-- Shared Bottom Nav (Relevance Check: Suppressed for Transactional/Focused Sign-Up Page) -->
<!-- As per instructions, navigation shell is suppressed for transactional screens like sign-up -->
</body></html>
