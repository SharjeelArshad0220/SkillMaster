<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Skill Master - Sign Up</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0ea5e9",
                        "primary-container": "#38bdf8",
                        "surface": "#ffffff",
                        "on-surface": "#0f172a",
                        "outline": "#94a3b8",
                        "outline-variant": "#e2e8f0",
                        "background": "#f8fafc",
                        "header-bg": "#f1f5f9"
                    },
                    fontFamily: {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Plus Jakarta Sans"],
                        "label": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                },
            },
        }
    </script>
<style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface selection:bg-primary-container selection:text-white min-h-screen flex flex-col overflow-x-hidden">
<!-- Top Zone (Matches Layout of SCREEN_83) -->
<header class="h-[309px] w-full bg-header-bg flex flex-col items-center justify-center space-y-4 shrink-0">
<div class="w-9 h-9 bg-primary flex items-center justify-center rounded-lg">
<span class="material-symbols-outlined text-white text-[24px]" style="font-variation-settings: 'FILL' 1;">architecture</span>
</div>
<div class="text-center">
<h1 class="text-on-surface text-[22px] font-semibold tracking-tight">Skill Master</h1>
<p class="text-outline text-[12px] mt-1 font-medium">AI-powered personalized learning</p>
</div>
</header>
<!-- Bottom Zone (Matches Layout of SCREEN_83) -->
<main class="flex-grow bg-surface px-6 py-7 flex flex-col">
<!-- Auth Tabs - Styled like SCREEN_83 but in light mode colors -->
<nav class="flex w-full mb-8 border-b border-outline-variant">
<button class="flex-1 pb-4 text-[14px] font-medium text-outline text-center transition-colors hover:text-primary">
                Login
            </button>
<button class="flex-1 pb-4 text-[14px] font-semibold text-primary border-b-2 border-primary text-center">
                Join
            </button>
</nav>
<!-- Form Section -->
<form class="flex flex-col space-y-4">
<!-- Full Name -->
<div class="flex flex-col space-y-2">
<label class="text-on-surface text-[12px] font-semibold uppercase tracking-wider">Full Name</label>
<input class="w-full bg-surface border border-outline-variant rounded-none py-3 px-4 text-[14px] text-on-surface placeholder:text-outline focus:border-primary focus:ring-0 transition-colors" placeholder="Enter your full name" type="text"/>
</div>
<!-- Email -->
<div class="flex flex-col space-y-2">
<label class="text-on-surface text-[12px] font-semibold uppercase tracking-wider">Email</label>
<input class="w-full bg-surface border border-outline-variant rounded-none py-3 px-4 text-[14px] text-on-surface placeholder:text-outline focus:border-primary focus:ring-0 transition-colors" placeholder="your@email.com" type="email"/>
</div>
<!-- Password -->
<div class="flex flex-col space-y-2">
<label class="text-on-surface text-[12px] font-semibold uppercase tracking-wider">Password</label>
<div class="relative">
<input class="w-full bg-surface border border-outline-variant rounded-none py-3 pl-4 pr-10 text-[14px] text-on-surface placeholder:text-outline focus:border-primary focus:ring-0 transition-colors" placeholder="Create a password" type="password"/>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline text-[20px] cursor-pointer hover:text-primary">visibility</span>
</div>
</div>
<!-- Confirm Password -->
<div class="flex flex-col space-y-2">
<label class="text-on-surface text-[12px] font-semibold uppercase tracking-wider">Confirm Password</label>
<div class="relative">
<input class="w-full bg-surface border border-outline-variant rounded-none py-3 pl-4 pr-10 text-[14px] text-on-surface placeholder:text-outline focus:border-primary focus:ring-0 transition-colors" placeholder="Repeat your password" type="password"/>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline text-[20px] cursor-pointer hover:text-primary">visibility</span>
</div>
</div>
<!-- Action Button - Rounded None as per Skill Master Pro design system influence on SCREEN_83 -->
<button class="w-full h-11 bg-primary text-white text-[14px] font-bold uppercase tracking-wider rounded-none hover:bg-[#0284c7] active:scale-[0.98] transition-all flex items-center justify-center mt-4" type="submit">
                Create Account
            </button>
</form>
<!-- Footer Helper -->
<div class="mt-8 text-center">
<p class="text-outline text-[13px] font-medium">
                Already have an account? <a class="text-primary font-bold hover:underline ml-1" href="#">Log In</a>
</p>
</div>
</main>
</body></html>
