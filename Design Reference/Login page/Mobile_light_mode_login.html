<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=390, height=844, initial-scale=1.0" name="viewport"/>
<title>Skill Master - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                        "on-background": "#d9e3f2",
                        "on-secondary-fixed": "#0a1d2f",
                        "on-primary": "#00354a",
                        "primary-fixed-dim": "#7bd0ff",
                        "surface-dim": "#0a141e",
                        "error-container": "#93000a",
                        "on-secondary-fixed-variant": "#37485c",
                        "inverse-on-surface": "#27313c",
                        "on-secondary-container": "#a5b7ce",

<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0a141e;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .mobile-canvas {
            width: 390px;
            height: 844px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="dark">
<div class="mobile-canvas bg-surface">
<!-- TOP ZONE (35% height) - Architectural Foundation -->
<div class="h-[35%] bg-white flex flex-col items-center justify-center space-y-3">
<!-- Logo Mark -->
<div class="w-[36px] h-[36px] bg-[#0EA5E9] rounded-[10px] flex items-center justify-center">
<svg fill="none" height="24" viewbox="0 0 24 24" width="24">
<circle cx="12" cy="5" r="2.5" stroke="#FFFFFF" stroke-width="2"></circle>
<circle cx="5" cy="17" r="2.5" stroke="#FFFFFF" stroke-width="2"></circle>
<circle cx="19" cy="17" r="2.5" stroke="#FFFFFF" stroke-width="2"></circle>
<line stroke="#FFFFFF" stroke-linecap="round" stroke-width="2" x1="12" x2="6.5" y1="7.5" y2="15"></line>
<line stroke="#FFFFFF" stroke-linecap="round" stroke-width="2" x1="12" x2="17.5" y1="7.5" y2="15"></line>
</svg>
</div>
<!-- Branding -->
<div class="text-center">
<h1 class="text-[22px] font-semibold text-[#0F172A] tracking-tight">Skill Master</h1>
<p class="text-[12px] font-normal text-[#94A3B8]">AI-powered personalized learning</p>
</div>
</div>
<!-- BOTTOM ZONE (65% height) - The Workspace -->
<div class="h-[65%] bg-[#F1F5F9] px-6 py-7 flex flex-col">
<!-- Tabs Navigation -->
<div class="flex border-b border-[#E2E8F0] mb-8">
<button class="flex-1 pb-3 text-sm font-semibold text-[#0EA5E9] border-b-2 border-[#0EA5E9] transition-all">
                    Log In
                </button>
<button class="flex-1 pb-3 text-sm font-normal text-[#94A3B8] transition-all">
                    Sign Up
                </button>
</div>
<!-- Auth Form -->
<form class="flex flex-col space-y-6 flex-grow">
<!-- Email Field (Error State) -->
<div class="flex flex-col space-y-1.5">
<label class="text-[12px] font-medium text-[#0F172A] ml-0.5">Email address</label>
<div class="relative">
<input class="w-full h-[40px] px-3 bg-white border-[1.5px] border-[#EF4444] rounded-[8px] text-[14px] text-[#0F172A] focus:ring-0 focus:outline-none placeholder:text-[#94A3B8]" type="email" value="user@example"/>
</div>
<span class="text-[11px] font-medium text-[#EF4444] ml-0.5">Enter a valid email address</span>
</div>
<!-- Password Field -->
<div class="flex flex-col space-y-1.5">
<label class="text-[12px] font-medium text-[#0F172A] ml-0.5">Password</label>
<div class="relative">
<input class="w-full h-[40px] px-3 bg-white border border-[#CBD5E1] rounded-[8px] text-[14px] text-[#0F172A] focus:border-[#0EA5E9] focus:ring-0 focus:outline-none placeholder:text-[#CBD5E1]" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-[#94A3B8]" type="button">
<span class="material-symbols-outlined text-[18px]">visibility</span>
</button>
</div>
</div>
<!-- Primary Action -->
<button class="w-full h-[40px] bg-[#0EA5E9] text-white font-semibold text-[14px] rounded-[8px] active:scale-[0.98] transition-transform mt-2" type="submit">
                    Log In
                </button>
<!-- Helper Footer (Within Workspace) -->
<div class="text-center mt-auto pb-4">
<p class="text-[13px] text-[#94A3B8]">
                        Don't have an account? 
                        <a class="text-[#0EA5E9] font-medium ml-1" href="#">Sign Up</a>
</p>
</div>
</form>
</div>
</div>
</body></html>
