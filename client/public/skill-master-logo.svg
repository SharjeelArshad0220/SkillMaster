<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="Skill Master logo">
  <defs>
    <!-- Subtle inner shadow for depth -->
    <filter id="soft-depth" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
    <!-- Node glow -->
    <filter id="node-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Clip for rounded square background -->
    <clipPath id="bg-clip">
      <rect width="120" height="120" rx="26" ry="26"/>
    </clipPath>
  </defs>

  <!-- Background — deep navy square with rounded corners -->
  <rect width="120" height="120" rx="26" ry="26" fill="#0F1923"/>

  <!-- Subtle inner top edge highlight — gives dimension without gradient -->
  <rect width="120" height="1.5" rx="0" ry="0" fill="#FFFFFF" opacity="0.04" clip-path="url(#bg-clip)"/>

  <!-- ═══ MARK — Three nodes connected by paths, forming an upward progression ═══ -->

  <!-- Connecting lines — drawn first so nodes sit on top -->
  <!-- Line: bottom-left node to top-center node -->
  <line
    x1="38" y1="78"
    x2="60" y2="42"
    stroke="#38BDF8"
    stroke-width="2.4"
    stroke-linecap="round"
    opacity="0.55"
  />

  <!-- Line: bottom-right node to top-center node -->
  <line
    x1="82" y1="78"
    x2="60" y2="42"
    stroke="#38BDF8"
    stroke-width="2.4"
    stroke-linecap="round"
    opacity="0.55"
  />

  <!-- Line: bottom-left to bottom-right (base, grounding line) -->
  <line
    x1="38" y1="78"
    x2="82" y2="78"
    stroke="#38BDF8"
    stroke-width="2.4"
    stroke-linecap="round"
    opacity="0.30"
  />

  <!-- Progress tick mark on the left line — represents advancement/mastery -->
  <!-- Small perpendicular tick at ~40% up the left line to suggest checkpoint -->
  <line
    x1="46" y1="63"
    x2="52" y2="57"
    stroke="#38BDF8"
    stroke-width="2"
    stroke-linecap="round"
    opacity="0.70"
  />

  <!-- ═══ NODES ═══ -->

  <!-- Bottom-left node — start / foundation -->
  <circle cx="38" cy="78" r="6.5" fill="#162032" stroke="#38BDF8" stroke-width="2" opacity="0.85"/>
  <circle cx="38" cy="78" r="2.5" fill="#38BDF8" opacity="0.60"/>

  <!-- Bottom-right node — parallel track / alternate path -->
  <circle cx="82" cy="78" r="6.5" fill="#162032" stroke="#38BDF8" stroke-width="2" opacity="0.85"/>
  <circle cx="82" cy="78" r="2.5" fill="#38BDF8" opacity="0.60"/>

  <!-- Top-center node — mastery / destination — primary, fully lit -->
  <circle cx="60" cy="42" r="8.5" fill="#162032" stroke="#38BDF8" stroke-width="2.5" filter="url(#node-glow)"/>
  <circle cx="60" cy="42" r="4" fill="#38BDF8"/>

</svg>
